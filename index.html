<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa Brumi — La Armonía de los Contrastes</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Casa Brumi">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#5A4A42">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FFFFFF;
      --bg-light: #F8F8F8;
      --brown: #5A4A42;
      --brown-dark: #3D2F2A;
      --beige: #D4C5B9;
      --gold: #B8956A;
      --text: #222222;
      --text-mid: #555555;
      --text-light: #999999;
      --border: #EBEBEB;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 500;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: 70px;
      display: flex;
      align-items: center;
      transition: box-shadow 0.3s ease;
    }

    .navbar.scrolled {
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }

    .nav-inner {
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      padding: 0 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--brown-dark);
      text-transform: uppercase;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      align-items: center;
      list-style: none;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-mid);
      transition: color 0.3s ease;
      text-transform: uppercase;
    }

    .nav-links a:hover { color: var(--brown); }

    .nav-coupon {
      background: var(--brown);
      color: white !important;
      padding: 10px 22px;
      border-radius: 50px;
      font-size: 12px !important;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .nav-coupon:hover {
      background: var(--brown-dark) !important;
      color: white !important;
      transform: translateY(-1px);
    }

    /* ===== HERO BANNER ===== */
    .hero {
      margin-top: 70px;
      position: relative;
      width: 100%;
      height: 85vh;
      min-height: 500px;
      max-height: 800px;
      overflow: hidden;
      background: #E8E0D8;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.05) 60%);
      display: flex;
      align-items: center;
      padding: 0 60px;
    }

    .hero-text {
      max-width: 600px;
      color: white;
    }

    .hero-subtitle {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0.9;
    }

    .hero-title {
      font-family: 'Playfair Display', serif;
      font-size: 56px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 28px;
    }

    .hero-btn {
      display: inline-block;
      padding: 16px 44px;
      background: white;
      color: var(--text);
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .hero-btn:hover {
      background: var(--brown);
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .hero-arrows {
      position: absolute;
      bottom: 40px;
      right: 60px;
      display: flex;
      gap: 12px;
    }

    .hero-arrow {
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text);
      transition: all 0.3s ease;
    }

    .hero-arrow:hover {
      background: white;
      transform: scale(1.1);
    }

    /* ===== SECTION COMMON ===== */
    .section-title {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }

    .section-subtitle {
      text-align: center;
      font-size: 14px;
      color: var(--text-light);
      margin-bottom: 40px;
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    /* ===== CATEGORY FILTERS ===== */
    .filters-section {
      padding: 80px 40px 0;
      max-width: 1400px;
      margin: 0 auto;
    }

    .filters-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .filter-btn {
      padding: 10px 24px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-light);
      transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
    }

    .filter-btn:hover {
      color: var(--text);
    }

    .filter-btn.active {
      color: var(--text);
      border-bottom-color: var(--brown);
    }

    /* ===== PRODUCTS GRID ===== */
    .products-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px 100px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
    }

    .product-card {
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .product-card:hover {
      transform: translateY(-4px);
    }

    .product-img-wrap {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg-light);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      margin-bottom: 16px;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .product-card:hover .product-img {
      transform: scale(1.06);
    }

    .img-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--brown);
      color: white;
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .img-count {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      backdrop-filter: blur(4px);
    }

    /* Thumbnails on hover */
    .img-thumbs {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      padding: 30px 10px 10px;
      display: none;
      gap: 6px;
      align-items: flex-end;
    }

    .product-card:hover .img-thumbs {
      display: flex;
    }

    .mini-thumb {
      width: 44px;
      height: 44px;
      border-radius: 4px;
      border: 2px solid rgba(255,255,255,0.5);
      cursor: pointer;
      transition: border-color 0.2s ease;
      flex-shrink: 0;
    }

    .mini-thumb:hover {
      border-color: white;
    }

    .product-meta {
      padding: 0 4px;
    }

    .product-category-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--text-light);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .product-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .product-description {
      font-size: 12px;
      color: var(--text-light);
      margin-bottom: 6px;
      line-height: 1.4;
      max-height: 34px;
      overflow: hidden;
    }

    .product-tags-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .ptag {
      font-size: 10px;
      background: var(--bg-light);
      color: var(--text-mid);
      padding: 3px 8px;
      border-radius: 3px;
      font-weight: 600;
    }

    .product-price {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    /* ===== PROMO BANNERS ===== */
    .promo-section {
      max-width: 1400px;
      margin: 0 auto 100px;
      padding: 0 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .promo-card {
      position: relative;
      height: 300px;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-light);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .promo-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    .promo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .promo-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(0,0,0,0.4), transparent);
      padding: 30px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .promo-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      margin-bottom: 8px;
    }

    .promo-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: white;
      line-height: 1.2;
      margin-bottom: 16px;
    }

    .promo-btn {
      display: inline-block;
      width: fit-content;
      padding: 10px 24px;
      background: white;
      color: var(--text);
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .promo-btn:hover {
      background: var(--brown);
      color: white;
    }

    /* ===== FOOTER ===== */
    .footer {
      background: var(--bg-light);
      padding: 60px 40px 30px;
      border-top: 1px solid var(--border);
    }

    .footer-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--brown-dark);
      letter-spacing: 2px;
    }

    .footer-tagline {
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      color: var(--text-light);
      font-style: italic;
      margin-top: 4px;
    }

    .footer-copy {
      font-size: 12px;
      color: var(--text-light);
    }

    /* ===== MODAL ===== */
    .modal-bg {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-bg.show { display: flex; }

    .modal-box {
      background: white;
      border-radius: 16px;
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: modalIn 0.35s ease;
    }

    @keyframes modalIn {
      from { transform: translateY(30px) scale(0.97); opacity: 0; }
      to { transform: translateY(0) scale(1); opacity: 1; }
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 32px;
      border-bottom: 1px solid var(--border);
    }

    .modal-top h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--brown-dark);
    }

    .modal-x {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--text-light);
      transition: all 0.2s;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .modal-x:hover {
      background: var(--bg-light);
      color: var(--text);
    }

    .modal-inner {
      padding: 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    .modal-gallery { display: flex; flex-direction: column; gap: 12px; }

    .modal-main-img {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg-light);
      border-radius: 10px;
      overflow: hidden;
    }

    .modal-main-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-thumbs {
      display: flex;
      gap: 8px;
    }

    .modal-thumb {
      width: 60px;
      height: 60px;
      border-radius: 6px;
      cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .modal-thumb:hover,
    .modal-thumb.active {
      border-color: var(--brown);
    }

    .modal-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-details {
      display: flex;
      flex-direction: column;
    }

    .md-cat {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .md-name {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--brown-dark);
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .md-desc {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .md-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .md-tag {
      font-size: 11px;
      background: rgba(184,149,106,0.12);
      color: var(--gold);
      padding: 5px 12px;
      border-radius: 50px;
      font-weight: 600;
    }

    .md-price {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }

    .md-stock {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 28px;
    }

    .md-stock.in { color: #25D366; font-weight: 600; }
    .md-stock.out { color: #E74C3C; font-weight: 600; }

    .md-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: auto;
    }

    .btn-wa {
      padding: 16px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .btn-wa:hover {
      background: #1a9d55;
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(37,211,102,0.3);
    }

    .btn-outline {
      padding: 14px;
      background: transparent;
      color: var(--brown);
      border: 2px solid var(--brown);
      border-radius: 50px;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .btn-outline:hover {
      background: var(--brown);
      color: white;
    }

    /* ===== COUPON MODAL ===== */
    .coupon-box {
      background: white;
      border-radius: 16px;
      padding: 50px 40px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      animation: modalIn 0.35s ease;
    }

    .coupon-box h2 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      color: var(--brown-dark);
      margin-bottom: 20px;
    }

    .coupon-box input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
      transition: border-color 0.3s;
    }

    .coupon-box input:focus {
      outline: none;
      border-color: var(--brown);
    }

    .coupon-box button {
      width: 100%;
      padding: 14px;
      background: var(--brown);
      color: white;
      border: none;
      border-radius: 50px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .coupon-box button:hover {
      background: var(--brown-dark);
    }

    /* ===== LOADING ===== */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-light);
      grid-column: 1 / -1;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--brown);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1024px) {
      .products-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
      .hero-title { font-size: 42px; }
      .modal-inner { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .nav-inner { padding: 0 20px; }
      .nav-links { gap: 16px; }
      .nav-links a { font-size: 11px; }
      .hero { height: 60vh; min-height: 350px; }
      .hero-overlay { padding: 0 30px; }
      .hero-title { font-size: 32px; }
      .hero-subtitle { font-size: 11px; }
      .hero-btn { padding: 14px 32px; font-size: 12px; }
      .hero-arrows { right: 20px; bottom: 20px; }
      .filters-section { padding: 50px 20px 0; }
      .products-container { padding: 0 20px 60px; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .product-name { font-size: 13px; }
      .product-price { font-size: 14px; }
      .promo-section { grid-template-columns: 1fr; padding: 0 20px; margin-bottom: 60px; }
      .section-title { font-size: 28px; }
      .modal-top { padding: 20px; }
      .modal-inner { padding: 20px; gap: 20px; }
      .md-name { font-size: 24px; }
      .md-price { font-size: 28px; }
      .footer-inner { flex-direction: column; gap: 16px; text-align: center; }
    }

    @media (max-width: 480px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .product-meta { padding: 0 2px; }
      .product-name { font-size: 12px; }
      .product-description { display: none; }
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a href="#" class="nav-logo">Casa Brumi</a>
    <ul class="nav-links">
      <li><a href="#" onclick="filterProducts('todos')">Shop</a></li>
      <li><a href="#productsArea" onclick="scrollToProducts()">Colección</a></li>
      <li><a href="#" class="nav-coupon" onclick="openCouponModal()">Cupón</a></li>
    </ul>
  </div>
</nav>

<!-- HERO BANNER -->
<section class="hero" id="heroBanner">
  <img class="hero-image" id="heroImage" src="" alt="Casa Brumi">
  <div class="hero-overlay">
    <div class="hero-text">
      <div class="hero-subtitle" id="heroSubtitle">Casa Brumi</div>
      <h1 class="hero-title" id="heroTitle">La Armonía de los Contrastes</h1>
      <button class="hero-btn" onclick="scrollToProducts()">Descubrir Ahora</button>
    </div>
  </div>
</section>

<!-- NEW ARRIVALS / FILTERS -->
<section class="filters-section" id="productsArea">
  <h2 class="section-title">Nueva Colección</h2>
  <p class="section-subtitle">Explora nuestras prendas cuidadosamente seleccionadas</p>
  <div class="filters-row" id="filtersRow"></div>
</section>

<!-- PRODUCTS GRID -->
<div class="products-container">
  <div class="products-grid" id="productsGrid">
    <div class="loading"><div class="spinner"></div>Cargando colección...</div>
  </div>
</div>

<!-- PROMO BANNERS -->
<div class="promo-section" id="promoSection"></div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-inner">
    <div>
      <div class="footer-logo">CASA BRUMI</div>
      <div class="footer-tagline">La Armonía de los Contrastes</div>
    </div>
    <div class="footer-copy">&copy; 2026 Casa Brumi. Todos los derechos reservados.</div>
  </div>
</footer>

<!-- PRODUCT MODAL -->
<div class="modal-bg" id="productModal" onclick="closeProductModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-top">
      <h2 id="modalTitle">Producto</h2>
      <button class="modal-x" onclick="closeProductModal()">&times;</button>
    </div>
    <div class="modal-inner">
      <div class="modal-gallery">
        <div class="modal-main-img"><img id="modalMainImg" src="" alt="Producto"></div>
        <div class="modal-thumbs" id="modalThumbs"></div>
      </div>
      <div class="modal-details">
        <div class="md-cat" id="mdCat"></div>
        <h1 class="md-name" id="mdName"></h1>
        <p class="md-desc" id="mdDesc"></p>
        <div class="md-tags" id="mdTags"></div>
        <div class="md-price" id="mdPrice"></div>
        <div class="md-stock" id="mdStock"></div>
        <div class="md-actions">
          <button class="btn-wa" onclick="sendWhatsapp()">Consultar por WhatsApp</button>
          <button class="btn-outline" onclick="shareProduct()">Compartir</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- COUPON MODAL -->
<div class="modal-bg" id="couponModal" onclick="closeCouponModal(event)">
  <div class="coupon-box" onclick="event.stopPropagation()">
    <h2>Cupón de Descuento</h2>
    <input type="text" id="couponInput" placeholder="Ingresa tu código...">
    <button onclick="applyCoupon()">Aplicar Cupón</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCncQbqrDIKyWWo9QXBfR31cT30S0fGfOI",
  authDomain: "brumi-cb671.firebaseapp.com",
  projectId: "brumi-cb671",
  storageBucket: "brumi-cb671.firebaseestorage.app",
  messagingSenderId: "886209508750",
  appId: "1:886209508750:web:3b1b82d155e3af9a55e0df",
  measurementId: "G-GMK0Y11NXZ"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allProducts = [];
let currentFilter = 'todos';
let selectedProduct = null;
let appliedCoupon = null;

// Navbar scroll effect
window.addEventListener('scroll', () => {
  document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 10);
});

// Load hero config from Firestore
async function loadHeroConfig() {
  try {
    const doc = await db.collection('config').doc('hero').get();
    if (doc.exists) {
      const data = doc.data();
      if (data.image) document.getElementById('heroImage').src = data.image;
      if (data.title) document.getElementById('heroTitle').textContent = data.title;
      if (data.subtitle) document.getElementById('heroSubtitle').textContent = data.subtitle;
    }
  } catch (e) {
    console.log('No hero config found, using defaults');
  }
}

// Load products
async function loadProducts() {
  try {
    const snapshot = await db.collection('products').get();
    allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(p => p.status !== 'draft');
    renderFilters();
    renderProducts();
  } catch (error) {
    console.error('Error:', error);
    document.getElementById('productsGrid').innerHTML = '<div class="loading" style="color:#E74C3C;">Error al cargar productos</div>';
  }
}

function renderFilters() {
  const cats = ['todos', ...new Set(allProducts.map(p => p.category).filter(Boolean))];
  document.getElementById('filtersRow').innerHTML = cats.map(c =>
    `<button class="filter-btn ${c === 'todos' ? 'active' : ''}" onclick="setFilter('${c}', this)">${c.charAt(0).toUpperCase() + c.slice(1)}</button>`
  ).join('');
}

function setFilter(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderProducts();
}

function filterProducts(cat) {
  currentFilter = cat;
  renderFilters();
  renderProducts();
  scrollToProducts();
}

function renderProducts() {
  const list = currentFilter === 'todos' ? allProducts : allProducts.filter(p => p.category === currentFilter);

  if (!list.length) {
    document.getElementById('productsGrid').innerHTML = '<div class="loading">No hay productos en esta categoría</div>';
    return;
  }

  document.getElementById('productsGrid').innerHTML = list.map(p => {
    const photos = p.photos || [];
    const thumbs = photos.slice(0, 4).map((ph, i) =>
      `<img class="mini-thumb" src="${ph}" alt="${i}" onclick="event.stopPropagation(); this.closest('.product-card').querySelector('.product-img').src='${ph}'">`
    ).join('');

    return `
      <div class="product-card" onclick="openProduct('${p.id}')">
        <div class="product-img-wrap">
          <img class="product-img" src="${photos[0] || ''}" alt="${p.name}">
          ${p.tags && p.tags.includes('nuevo') ? '<div class="img-badge">Nuevo</div>' : ''}
          ${photos.length > 1 ? `<div class="img-count">${photos.length} fotos</div>` : ''}
          ${photos.length > 1 ? `<div class="img-thumbs">${thumbs}</div>` : ''}
        </div>
        <div class="product-meta">
          <div class="product-category-label">${p.category || ''}</div>
          <div class="product-name">${p.name}</div>
          ${p.description ? `<div class="product-description">${p.description}</div>` : ''}
          ${p.tags ? `<div class="product-tags-row">${p.tags.split(',').slice(0, 3).map(t => `<span class="ptag">${t.trim()}</span>`).join('')}</div>` : ''}
          <div class="product-price">RD$ ${p.price ? p.price.toLocaleString() : '0'}</div>
        </div>
      </div>
    `;
  }).join('');
}

function openProduct(id) {
  selectedProduct = allProducts.find(p => p.id === id);
  if (!selectedProduct) return;
  const photos = selectedProduct.photos || [];

  document.getElementById('modalTitle').textContent = selectedProduct.name;
  document.getElementById('mdCat').textContent = selectedProduct.category || '';
  document.getElementById('mdName').textContent = selectedProduct.name;
  document.getElementById('mdDesc').textContent = selectedProduct.description || 'Sin descripción disponible';
  document.getElementById('mdPrice').textContent = `RD$ ${selectedProduct.price ? selectedProduct.price.toLocaleString() : '0'}`;

  const stockEl = document.getElementById('mdStock');
  if (selectedProduct.stock > 0) {
    stockEl.className = 'md-stock in';
    stockEl.textContent = `En stock (${selectedProduct.stock} unidades)`;
  } else {
    stockEl.className = 'md-stock out';
    stockEl.textContent = 'Agotado';
  }

  document.getElementById('mdTags').innerHTML = selectedProduct.tags
    ? selectedProduct.tags.split(',').map(t => `<span class="md-tag">${t.trim()}</span>`).join('')
    : '';

  document.getElementById('modalMainImg').src = photos[0] || '';
  document.getElementById('modalThumbs').innerHTML = photos.map((ph, i) =>
    `<div class="modal-thumb ${i === 0 ? 'active' : ''}" onclick="document.getElementById('modalMainImg').src='${ph}'; document.querySelectorAll('.modal-thumb').forEach(t=>t.classList.remove('active')); this.classList.add('active')"><img src="${ph}" alt=""></div>`
  ).join('');

  document.getElementById('productModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeProductModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('productModal').classList.remove('show');
  document.body.style.overflow = '';
}

function openCouponModal() {
  document.getElementById('couponModal').classList.add('show');
}

function closeCouponModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('couponModal').classList.remove('show');
}

function applyCoupon() {
  const code = document.getElementById('couponInput').value.trim().toUpperCase();
  if (!code) return alert('Ingresa un código');
  appliedCoupon = code;
  alert('Cupón "' + code + '" aplicado');
  closeCouponModal();
}

function sendWhatsapp() {
  if (!selectedProduct) return;
  let msg = 'Hola, me interesa: ' + selectedProduct.name + ' - RD$ ' + selectedProduct.price;
  if (appliedCoupon) msg += ' (Cupón: ' + appliedCoupon + ')';
  window.open('https://wa.me/?text=' + encodeURIComponent(msg), '_blank');
}

function shareProduct() {
  if (!selectedProduct) return;
  const txt = selectedProduct.name + ' - RD$ ' + selectedProduct.price + ' | Casa Brumi';
  if (navigator.share) {
    navigator.share({ title: 'Casa Brumi', text: txt, url: location.href });
  } else {
    navigator.clipboard.writeText(txt).then(() => alert('Copiado al portapapeles'));
  }
}

function scrollToProducts() {
  document.getElementById('productsArea').scrollIntoView({ behavior: 'smooth' });
}

// Init
loadHeroConfig();
loadProducts();
</script>

</body>
</html>
