<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casa Brumi — La Armonía de los Contrastes</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --marble-white: #F5F3F0;
      --warm-taupe: #9B8B7E;
      --earth-brown: #6B5B4F;
      --light-beige: #E8DFD5;
      --sage-green: #8A9B7F;
      --burnt-sienna: #A0513D;
      --text-dark: #3A3A3A;
      --text-light: #6B6B6B;
      --accent-gold: #C9A876;
      --success: #25D366;
    }

    html, body {
      height: 100%;
      background: linear-gradient(135deg, var(--marble-white) 0%, #F9F7F5 100%);
      font-family: 'Lora', serif;
    }

    body {
      color: var(--text-dark);
      line-height: 1.6;
      letter-spacing: 0.3px;
    }

    /* ========== HEADER ========== */
    .header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(155, 139, 126, 0.15);
      padding: 30px 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      animation: slideDown 0.6s ease-out;
    }

    @keyframes slideDown {
      from { transform: translateY(-20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      text-align: center;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--earth-brown);
      letter-spacing: 2px;
      margin-bottom: 8px;
      text-transform: uppercase;
      position: relative;
      display: inline-block;
    }

    .header h1::before,
    .header h1::after {
      content: "❖";
      position: absolute;
      color: var(--accent-gold);
      font-size: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.7;
    }

    .header h1::before { left: -30px; }
    .header h1::after { right: -30px; }

    .header-tagline {
      font-family: 'Playfair Display', serif;
      font-size: 0.95rem;
      color: var(--warm-taupe);
      font-style: italic;
      letter-spacing: 1px;
      font-weight: 400;
      margin-top: 6px;
    }

    .feather-accent {
      display: inline-block;
      width: 50px;
      height: 20px;
      margin: 12px 0;
      opacity: 0.6;
      animation: floatFeather 3s ease-in-out infinite;
    }

    @keyframes floatFeather {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-5px) rotate(2deg); }
    }

    /* ========== FILTERS ========== */
    .filter-section {
      max-width: 1200px;
      margin: 30px auto;
      padding: 0 20px;
      animation: fadeIn 0.8s ease-out 0.2s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 30px;
    }

    .filter-btn {
      padding: 12px 28px;
      border: 2px solid var(--warm-taupe);
      background: rgba(255, 255, 255, 0.7);
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: var(--earth-brown);
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      overflow: hidden;
    }

    .filter-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, var(--warm-taupe), var(--earth-brown));
      transition: left 0.4s ease;
      z-index: -1;
    }

    .filter-btn:hover::before {
      left: 0;
    }

    .filter-btn:hover {
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(107, 91, 79, 0.2);
    }

    .filter-btn.active {
      background: linear-gradient(135deg, var(--warm-taupe), var(--earth-brown));
      color: white;
      border-color: var(--earth-brown);
      box-shadow: 0 8px 20px rgba(107, 91, 79, 0.25);
    }

    .filter-btn.active::before {
      left: 0;
    }

    /* ========== COUPON SECTION ========== */
    .coupon-section {
      max-width: 1200px;
      margin: 0 auto 40px;
      padding: 0 20px;
    }

    .coupon-container {
      background: linear-gradient(135deg, rgba(201, 168, 118, 0.1), rgba(155, 139, 126, 0.08));
      border: 2px solid var(--accent-gold);
      border-radius: 15px;
      padding: 20px;
      display: flex;
      gap: 12px;
      align-items: center;
      backdrop-filter: blur(10px);
      animation: slideUp 0.6s ease-out 0.3s both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .coupon-label {
      font-size: 0.9rem;
      color: var(--earth-brown);
      font-weight: 500;
      white-space: nowrap;
      font-family: 'Inter', sans-serif;
    }

    .coupon-input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid var(--accent-gold);
      background: rgba(255, 255, 255, 0.8);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
      transition: all 0.3s ease;
    }

    .coupon-input:focus {
      outline: none;
      background: white;
      border-color: var(--earth-brown);
      box-shadow: 0 0 0 3px rgba(201, 168, 118, 0.2);
    }

    .coupon-btn {
      padding: 10px 24px;
      background: var(--accent-gold);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .coupon-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(201, 168, 118, 0.3);
    }

    /* ========== PRODUCTS GRID ========== */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 24px;
      animation: fadeIn 0.8s ease-out 0.4s both;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.8);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      border: 1px solid rgba(155, 139, 126, 0.15);
      backdrop-filter: blur(10px);
      position: relative;
    }

    .product-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 32px rgba(107, 91, 79, 0.15);
      border-color: var(--warm-taupe);
    }

    /* ========== PRODUCT IMAGE CONTAINER WITH THUMBNAILS ========== */
    .product-image-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, var(--light-beige), #F0E8E0);
      overflow: hidden;
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .product-card:hover .product-image {
      transform: scale(1.05);
    }

    .image-counter {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(107, 91, 79, 0.85);
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      backdrop-filter: blur(5px);
    }

    /* Image thumbnails preview */
    .image-thumbnails {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      padding: 8px;
      gap: 6px;
      overflow-x: auto;
      backdrop-filter: blur(5px);
    }

    .product-card:hover .image-thumbnails {
      display: flex;
    }

    .thumbnail {
      width: 40px;
      height: 40px;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      flex-shrink: 0;
      transition: all 0.2s ease;
      opacity: 0.7;
    }

    .thumbnail:hover {
      opacity: 1;
      border-color: var(--accent-gold);
    }

    /* ========== PRODUCT INFO ========== */
    .product-info {
      padding: 16px;
    }

    .product-category {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--earth-brown);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .product-description {
      font-size: 0.85rem;
      color: var(--text-light);
      margin-bottom: 8px;
      line-height: 1.4;
      max-height: 40px;
      overflow: hidden;
    }

    .product-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }

    .product-tag {
      background: rgba(155, 139, 126, 0.1);
      color: var(--warm-taupe);
      padding: 3px 8px;
      border-radius: 12px;
      font-size: 0.7rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
    }

    .product-price {
      color: var(--burnt-sienna);
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 10px;
      font-family: 'Lora', serif;
    }

    .btn-consultar {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, var(--warm-taupe), var(--earth-brown));
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }

    .btn-consultar::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, var(--earth-brown), var(--burnt-sienna));
      transition: left 0.3s ease;
      z-index: -1;
    }

    .btn-consultar:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(160, 81, 61, 0.25);
    }

    .btn-consultar:hover::before {
      left: 0;
    }

    /* ========== MODAL ========== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeInModal 0.3s ease;
    }

    @keyframes fadeInModal {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal.show {
      display: flex;
    }

    .modal-content {
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      max-width: 700px;
      width: 100%;
      border-radius: 16px;
      overflow: auto;
      max-height: 90vh;
      border: 1px solid rgba(155, 139, 126, 0.2);
      animation: slideUpModal 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    @keyframes slideUpModal {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid rgba(155, 139, 126, 0.15);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: var(--earth-brown);
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--text-light);
      transition: all 0.2s ease;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      color: var(--earth-brown);
      transform: rotate(90deg);
    }

    .modal-body {
      padding: 24px;
    }

    /* Gallery */
    .gallery-container {
      margin-bottom: 20px;
    }

    .gallery-image {
      width: 100%;
      height: 400px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      background: var(--light-beige);
    }

    .gallery-nav {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .nav-btn {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, var(--warm-taupe), var(--earth-brown));
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(107, 91, 79, 0.2);
    }

    .image-indicator {
      text-align: center;
      color: var(--text-light);
      font-size: 0.9rem;
      margin: 0;
      padding: 8px 0;
      font-family: 'Inter', sans-serif;
    }

    /* Product details in modal */
    .product-details {
      margin-bottom: 20px;
    }

    .detail-category {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .detail-description {
      color: var(--text-light);
      margin-bottom: 12px;
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }

    .detail-tag {
      background: rgba(155, 139, 126, 0.1);
      color: var(--warm-taupe);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
    }

    .detail-price {
      color: var(--burnt-sienna);
      font-weight: 700;
      font-size: 1.4rem;
      margin-bottom: 8px;
      font-family: 'Lora', serif;
    }

    .detail-stock {
      color: var(--text-light);
      font-size: 0.9rem;
      margin-bottom: 20px;
      font-family: 'Inter', sans-serif;
    }

    .detail-stock.in-stock {
      color: var(--sage-green);
      font-weight: 600;
    }

    .detail-stock.out-of-stock {
      color: var(--burnt-sienna);
      font-weight: 600;
    }

    /* Action buttons */
    .modal-actions {
      display: flex;
      gap: 12px;
    }

    .btn-whatsapp {
      flex: 1;
      padding: 14px;
      background: linear-gradient(135deg, var(--success), #1fa754);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-whatsapp:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(37, 211, 102, 0.3);
    }

    .btn-share {
      padding: 14px 20px;
      background: rgba(155, 139, 126, 0.1);
      color: var(--earth-brown);
      border: 2px solid var(--warm-taupe);
      border-radius: 50px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s ease;
    }

    .btn-share:hover {
      background: var(--warm-taupe);
      color: white;
    }

    /* ========== LOADING STATE ========== */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-light);
      font-size: 1rem;
      animation: fadeIn 0.4s ease;
    }

    .loading-spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(155, 139, 126, 0.2);
      border-top-color: var(--warm-taupe);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .header h1::before,
      .header h1::after {
        display: none;
      }

      .header-tagline {
        font-size: 0.85rem;
      }

      .products-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 16px;
      }

      .filter-section {
        margin: 20px auto;
      }

      .filters {
        gap: 8px;
      }

      .filter-btn {
        padding: 10px 20px;
        font-size: 0.85rem;
      }

      .coupon-container {
        flex-direction: column;
        gap: 10px;
      }

      .coupon-label {
        width: 100%;
      }

      .coupon-input,
      .coupon-btn {
        width: 100%;
      }

      .modal-content {
        max-width: 90%;
      }

      .gallery-image {
        height: 300px;
      }

      .product-name {
        font-size: 1rem;
      }

      .detail-price {
        font-size: 1.2rem;
      }

      .modal-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-content">
    <h1>Casa Brumi</h1>
    <svg class="feather-accent" viewBox="0 0 100 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M 50 5 Q 40 15 35 25 Q 30 35 25 40 M 50 5 Q 45 12 42 22" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <path d="M 50 5 Q 60 15 65 25 Q 70 35 75 40 M 50 5 Q 55 12 58 22" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="header-tagline">La Armonía de los Contrastes</div>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="container">

  <!-- COUPON SECTION -->
  <div class="coupon-section">
    <div class="coupon-container">
      <span class="coupon-label">¿Tienes cupón de descuento?</span>
      <input type="text" id="couponInput" class="coupon-input" placeholder="Ingresa tu código aquí...">
      <button class="coupon-btn" onclick="applyCoupon()">Aplicar</button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-section">
    <div class="filters" id="filters"></div>
  </div>

  <!-- PRODUCTS GRID -->
  <div class="products-grid" id="productsGrid">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div>Cargando colección...</div>
    </div>
  </div>

</div>

<!-- PRODUCT DETAIL MODAL -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalProductName"></h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="gallery-container">
        <img id="galleryImage" class="gallery-image" src="" alt="Producto">
        <div class="gallery-nav">
          <button class="nav-btn" onclick="prevImage()">← Anterior</button>
          <div class="image-indicator" id="imageIndicator"></div>
          <button class="nav-btn" onclick="nextImage()">Siguiente →</button>
        </div>
      </div>

      <div class="product-details">
        <div class="detail-category" id="modalCategory"></div>
        <div class="detail-description" id="modalDescription"></div>

        <div class="detail-tags" id="modalTags"></div>

        <div class="detail-price" id="modalProductPrice"></div>
        <div class="detail-stock" id="modalProductStock"></div>
      </div>

      <div class="modal-actions">
        <button class="btn-whatsapp" onclick="sendWhatsappMessage()">📱 Enviar WhatsApp</button>
        <button class="btn-share" onclick="shareProduct()">Compartir</button>
      </div>
    </div>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCncQbqrDIKyWWo9QXBfR31cT30S0fGfOI",
  authDomain: "brumi-cb671.firebaseapp.com",
  projectId: "brumi-cb671",
  storageBucket: "brumi-cb671.firebaseestorage.app",
  messagingSenderId: "886209508750",
  appId: "1:886209508750:web:3b1b82d155e3af9a55e0df",
  measurementId: "G-GMK0Y11NXZ"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allProducts = [];
let currentFilter = 'todos';
let selectedProduct = null;
let currentImageIndex = 0;
let appliedCoupon = null;

async function loadProducts() {
  try {
    const snapshot = await db.collection('products').get();
    allProducts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderProducts();
    renderFilters();
  } catch (error) {
    console.error('Error:', error);
    document.getElementById('productsGrid').innerHTML = '<div class="loading" style="color: #A0513D;">Error al cargar la colección</div>';
  }
}

function renderFilters() {
  const categories = ['todos', ...new Set(allProducts.map(p => p.category).filter(Boolean))];
  const filtersDiv = document.getElementById('filters');
  filtersDiv.innerHTML = categories.map(cat => `
    <button class="filter-btn ${cat === 'todos' ? 'active' : ''}" onclick="filterProducts('${cat}')">${cat.charAt(0).toUpperCase() + cat.slice(1)}</button>
  `).join('');
}

function filterProducts(category) {
  currentFilter = category;
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  event.target.classList.add('active');
  renderProducts();
}

function renderProducts() {
  const filtered = currentFilter === 'todos' ? allProducts : allProducts.filter(p => p.category === currentFilter);

  if (filtered.length === 0) {
    document.getElementById('productsGrid').innerHTML = '<div class="loading">No hay productos en esta categoría</div>';
    return;
  }

  const html = filtered.map(product => {
    const photos = product.photos || [];
    const thumbnails = photos.slice(0, 3).map((photo, idx) =>
      `<img class="thumbnail" src="${photo}" alt="Imagen ${idx + 1}" onclick="event.stopPropagation()">`
    ).join('');

    return `
      <div class="product-card" onclick="openProductDetail('${product.id}')">
        <div class="product-image-container">
          <img class="product-image" src="${photos[0] || ''}" alt="${product.name}">
          ${photos.length > 1 ? `<div class="image-counter">${photos.length} fotos</div>` : ''}
          ${photos.length > 0 ? `<div class="image-thumbnails">${thumbnails}</div>` : ''}
        </div>
        <div class="product-info">
          <div class="product-category">${product.category || 'Sin categoría'}</div>
          <div class="product-name">${product.name}</div>
          ${product.description ? `<div class="product-description">${product.description.substring(0, 60)}${product.description.length > 60 ? '...' : ''}</div>` : ''}
          ${product.tags ? `<div class="product-tags">${product.tags.split(',').slice(0, 2).map(t => `<span class="product-tag">${t.trim()}</span>`).join('')}</div>` : ''}
          <div class="product-price">RD$ ${product.price.toLocaleString()}</div>
          <button class="btn-consultar" onclick="event.stopPropagation(); sendWhatsappQuick('${product.name}', '${product.price}')">Consultar</button>
        </div>
      </div>
    `;
  }).join('');

  document.getElementById('productsGrid').innerHTML = html;
}

function openProductDetail(productId) {
  selectedProduct = allProducts.find(p => p.id === productId);
  currentImageIndex = 0;
  if (!selectedProduct) return;

  document.getElementById('modalProductName').textContent = selectedProduct.name;
  document.getElementById('modalCategory').textContent = selectedProduct.category || '';
  document.getElementById('modalDescription').textContent = selectedProduct.description || 'Sin descripción disponible';

  const tagsHtml = selectedProduct.tags
    ? selectedProduct.tags.split(',').map(t => `<span class="detail-tag">${t.trim()}</span>`).join('')
    : '';
  document.getElementById('modalTags').innerHTML = tagsHtml;

  document.getElementById('modalProductPrice').textContent = `RD$ ${selectedProduct.price.toLocaleString()}`;

  const stockStatus = selectedProduct.stock > 0 ?
    `<span class="in-stock">✓ En stock (${selectedProduct.stock} unidades)</span>` :
    `<span class="out-of-stock">❌ Agotado</span>`;
  document.getElementById('modalProductStock').innerHTML = stockStatus;

  showImage();
  document.getElementById('productModal').classList.add('show');
}

function showImage() {
  if (!selectedProduct?.photos?.length) return;
  document.getElementById('galleryImage').src = selectedProduct.photos[currentImageIndex];
  document.getElementById('imageIndicator').textContent = `${currentImageIndex + 1} / ${selectedProduct.photos.length}`;
}

function nextImage() {
  if (!selectedProduct?.photos) return;
  currentImageIndex = (currentImageIndex + 1) % selectedProduct.photos.length;
  showImage();
}

function prevImage() {
  if (!selectedProduct?.photos) return;
  currentImageIndex = (currentImageIndex - 1 + selectedProduct.photos.length) % selectedProduct.photos.length;
  showImage();
}

function closeModal() {
  document.getElementById('productModal').classList.remove('show');
}

function sendWhatsappMessage() {
  if (!selectedProduct) return;
  let message = `Hola, me interesa el ${selectedProduct.name} a RD$ ${selectedProduct.price}`;
  if (appliedCoupon) {
    message += ` (con cupón: ${appliedCoupon})`;
  }
  window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
}

function sendWhatsappQuick(productName, price) {
  let message = `Hola, me interesa el ${productName} a RD$ ${price}`;
  if (appliedCoupon) {
    message += ` (con cupón: ${appliedCoupon})`;
  }
  window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
}

function applyCoupon() {
  const couponInput = document.getElementById('couponInput');
  const code = couponInput.value.trim().toUpperCase();

  if (!code) {
    alert('Ingresa un código de cupón');
    return;
  }

  // For now, accept any coupon (in a real system, validate against Firestore discounts)
  appliedCoupon = code;
  couponInput.style.borderColor = '#8A9B7F';
  couponInput.style.backgroundColor = 'rgba(138, 155, 127, 0.05)';

  setTimeout(() => {
    alert(`✓ Cupón "${code}" aplicado. Se incluirá en tu mensaje de WhatsApp.`);
  }, 200);
}

function shareProduct() {
  if (!selectedProduct) return;

  const text = `Mira este producto: ${selectedProduct.name} - RD$ ${selectedProduct.price}. Casa Brumi - La Armonía de los Contrastes`;

  if (navigator.share) {
    navigator.share({
      title: 'Casa Brumi',
      text: text,
      url: window.location.href
    });
  } else {
    // Fallback: copy to clipboard
    navigator.clipboard.writeText(text).then(() => {
      alert('Producto copiado al portapapeles');
    });
  }
}

// Load products on page load
loadProducts();
</script>

</body>
</html>
